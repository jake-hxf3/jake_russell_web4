<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/grid.css" rel="stylesheet" type="text/css">
    <link href="css/main.css" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Wolfgang Autos | Home </title>
</head>
    <body>
        <h1 class="hidden">Welcome to Wolfgang Autos Gmbh</h1>
        <div id="hero" class="full-width-grid-con">
            <section class="grid-con col-start-2 col-end-3 overlap">
                <h2 class="col-span-full">Find the Sweet Ride of Your Dream</h2>
                <p class="col-span-full">We can help you to find your dream car. Our dealership offer a wide selection of vehicles tailored to your needs. Wolfgang sells nothing but the best cars you may think of.</p>
                <div id="logo-con" class="col-span-full">
                    <img src="images/jaguar-logo.svg" alt="Jaguar Logo">
                    <img src="images/audi-logo.svg" alt="Audi Logo">
                    <img src="images/camry-logo.svg" alt="Camry Logo">
                    <img src="images/acura-logo.svg" alt="Acura Logo">
                </div>

            </section>
            <div id="hero-image" class="image-placeholder col-span-full overlap"></div>
        </div>

        <script src="js/main.js"></script>
    </body>
</html>
